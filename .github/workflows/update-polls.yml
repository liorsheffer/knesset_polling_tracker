name: Update poll data

on:
  schedule:
    # Once a day at 06:00 UTC. This job waits in GitHub's queue until your
    # self-hosted runner is online and picks it up — it won't fail if your
    # computer happens to be off at that exact time, it just runs whenever
    # the runner next connects.
    - cron: "0 6 * * *"
  workflow_dispatch: {}   # lets you trigger it manually from the Actions tab
  push:
    branches: [main]

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  scrape:
    # Runs on YOUR machine (the self-hosted runner you registered), not
    # GitHub's shared servers — themadad.com blocks GitHub's IP ranges,
    # but not yours.
    runs-on: self-hosted
    outputs:
      changed: ${{ steps.diff.outputs.changed }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Scrape latest polls
        run: python3 scrape.py

      - name: Check for changes
        id: diff
        run: |
          if git diff --quiet -- data/polls.json; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
          else
            echo "changed=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Commit updated data
        if: steps.diff.outputs.changed == 'true'
        run: |
          git config user.name "poll-tracker-bot"
          git config user.email "actions@users.noreply.github.com"
          git add data/polls.json
          git commit -m "chore: refresh poll data [automated]"
          git push

  deploy:
    needs: scrape
    # This job just needs to publish files that are already in the repo —
    # no request to themadad.com — so GitHub's own servers are fine here.
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main

      - name: Upload site
        uses: actions/upload-pages-artifact@v3
        with:
          path: .

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
